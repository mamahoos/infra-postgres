# infra-postgres — cluster-level overrides (image defaults apply for unspecified settings)

listen_addresses = '*'
port = 5432

# Session defaults (cluster-wide — not per-application database)
timezone = 'UTC'
statement_timeout = 30s
idle_in_transaction_session_timeout = 60s

# Logging
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 1000
log_line_prefix = '%m [%p] %u@%d '

# Connections
max_connections = 100

# Memory (sensible defaults for small deployments)
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB

# WAL
wal_level = replica
max_wal_size = 1GB
min_wal_size = 80MB

# Query statistics (requires extension in 00-extensions.sql)
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.max = 10000
pg_stat_statements.track = all
