services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-17}-alpine
    container_name: infra-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ:-UTC}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/conf/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/conf/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/healthcheck.sh:/healthcheck.sh:ro
      - ./backups:/backups
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - hba_file=/etc/postgresql/pg_hba.conf
    networks:
      - infra_db_net
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "sh /healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  infra_db_net:
    name: infra_db_net
    driver: bridge
    internal: true

volumes:
  postgres-data:
    name: infra_postgres_data
